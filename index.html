<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デプロイテスト</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #EEF1FB 0%, #E8F5F3 100%);
      font-family: 'Noto Sans JP', sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(79,126,247,0.10);
      max-width: 420px;
      width: calc(100% - 48px);
    }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #4F7EF7, #1BC6B4);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      color: #1C1D2E;
      margin: 0 0 16px;
      line-height: 1.5;
    }
    p {
      font-size: 14px;
      color: #888;
      line-height: 1.9;
      margin: 0 0 32px;
    }
    .version {
      display: inline-block;
      background: #F0FDF4;
      color: #16a34a;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #bbf7d0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">DEPLOY TEST</div>
    <h1>Cloudflare 自動デプロイ<br>テスト用ページ</h1>
    <p>GitHubにpushすると<br>このページが自動で更新されます。</p>
    <div class="version">Version 2</div>
  </div>
</body>
</html>
